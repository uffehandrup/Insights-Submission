services:
  postgres:
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_DB: event_sourcing
      POSTGRES_USER: es_admin
      POSTGRES_PASSWORD: StrongForNow1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U es_admin -d event_sourcing"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9.12.0
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@xflow.dk
      - PGADMIN_DEFAULT_PASSWORD=adminpassword
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/data/pgadmin
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.3.0-management
    hostname: insights-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    image: api
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      # Bind-mount the host api-data dir so ingestion-rate.csv lands directly in
      # the repo for offline analysis
      - ./api-data:/app/data

volumes:
  pgadmin_data:
  pgdata:
  rabbitmq-data: